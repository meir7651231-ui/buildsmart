name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/whats-happening-LyY9G
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build
        env:
          GITHUB_PAGES: '1'

      - name: Push to gh-pages
        run: |
          cd app/dist
          touch .nojekyll
          git init -q
          git config user.email "bot@buildsmart"
          git config user.name "BuildSmart CI"
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
