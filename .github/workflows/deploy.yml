name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/whats-happening-LyY9G
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Preact app (live at /buildsmart/) ──────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Preact deps
        working-directory: app
        run: npm ci

      - name: Build Preact app
        working-directory: app
        run: npm run build
        env:
          GITHUB_PAGES: '1'

      # ─── Flutter app (preview at /buildsmart/flutter/) ──────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install Flutter deps
        working-directory: app_flutter
        run: flutter pub get

      - name: Flutter analyze (GATE — blocks build on any error)
        working-directory: app_flutter
        run: flutter analyze

      - name: Flutter test (GATE — blocks build on any failure)
        working-directory: app_flutter
        run: flutter test --reporter=compact

      - name: Build Flutter web
        working-directory: app_flutter
        run: flutter build web --release --base-href "/buildsmart/flutter/"

      - name: Stage Flutter under /flutter/
        run: |
          mkdir -p app/dist/flutter
          cp -r app_flutter/build/web/* app/dist/flutter/

      # ─── Publish combined output FIRST ──────────────────────────
      # The web deploy must NOT depend on the (fragile, Android-toolchain)
      # APK build below — otherwise an APK failure freezes the live site.
      - name: Push to gh-pages
        run: |
          cd app/dist
          touch .nojekyll
          git init -q
          git config user.email "bot@buildsmart"
          git config user.name "BuildSmart CI"
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "deploy: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

      # ─── APK (offline Android) — best-effort, never blocks deploy ─
      - name: Setup Java (required for Android build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Android APK
        working-directory: app_flutter
        continue-on-error: true
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: buildsmart-apk
          path: app_flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30
