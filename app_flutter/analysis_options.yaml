include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    # Treat avoid_print as an error to keep debug output out of production code.
    # Use debugPrint() or a proper logger instead.
    # Test files that need print() must add: // ignore_for_file: avoid_print
    avoid_print: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"

linter:
  rules:
    public_member_api_docs: false
    lines_longer_than_80_chars: false
