name: buildsmart
description: "BuildSmart — construction site procurement & task management"
publish_to: 'none'
version: 1.4.1+6

environment:
  sdk: ^3.7.2

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # state management — closest spirit to @preact/signals
  flutter_riverpod: ^2.6.1

  # routing — official, supports deep links + web URLs
  go_router: ^14.6.2

  # i18n — לא בשימוש ישיר; `any` נפתר על שני ה-SDK pins (0.19 ב-3.29 / 0.20 ב-3.44)
  intl: any

  # native barcode scanner — iOS/Android + Web (limited)
  mobile_scanner: ^5.2.3

  # microphone permission (used by speech_to_text)
  permission_handler: ^11.3.1

  # persistence (settings + profile)
  shared_preferences: ^2.3.4

  # native speech-to-text — iOS/Android (Web falls back to Web Speech)
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # strictest analyzer preset
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/lipskey/products/
    - assets/lipskey/pages/
    - assets/polyroll/pages/
    - assets/fonts/

  fonts:
    - family: Heebo
      fonts:
        - asset: assets/fonts/Heebo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Heebo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Heebo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Heebo-ExtraBold.ttf
          weight: 800
