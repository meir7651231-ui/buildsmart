<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="wallTiles" x="0" y="0" width="62" height="62" patternUnits="userSpaceOnUse">
      <rect width="62" height="62" fill="#bcd6dd"/>
      <path d="M 0 62 L 62 62 M 62 0 L 62 62" stroke="#6f8c95" stroke-width="1.1" stroke-opacity="0.85"/>
      <rect x="2" y="2" width="58" height="58" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="0.7"/>
      <rect x="2" y="2" width="58" height="22" fill="#ffffff" fill-opacity="0.12"/>
    </pattern>

    <pattern id="floorTiles" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="#9eb1b9"/>
      <path d="M 0 120 L 120 120 M 120 0 L 120 120" stroke="#5e7079" stroke-width="1.2" stroke-opacity="0.85"/>
      <path d="M 10 28 Q 38 42 62 34 T 110 46" stroke="#b6c4ca" stroke-width="0.8" stroke-opacity="0.55" fill="none"/>
      <path d="M 5 88 Q 40 82 75 96 T 118 102" stroke="#b6c4ca" stroke-width="0.8" stroke-opacity="0.45" fill="none"/>
      <path d="M 30 6 Q 52 14 70 9" stroke="#b6c4ca" stroke-width="0.6" stroke-opacity="0.5" fill="none"/>
    </pattern>

    <linearGradient id="wallShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2c8" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#23454e" stop-opacity="0.35"/>
    </linearGradient>

    <linearGradient id="chromeH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a6268"/>
      <stop offset="25%" stop-color="#b5bcc1"/>
      <stop offset="50%" stop-color="#f4f7f9"/>
      <stop offset="75%" stop-color="#b5bcc1"/>
      <stop offset="100%" stop-color="#5a6268"/>
    </linearGradient>

    <linearGradient id="chromeV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5bcc1"/>
      <stop offset="50%" stop-color="#f4f7f9"/>
      <stop offset="100%" stop-color="#5a6268"/>
    </linearGradient>

    <radialGradient id="ceilingLight" cx="50%" cy="-5%" r="75%">
      <stop offset="0%" stop-color="#ffe8a3" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#ffe8a3" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffe8a3" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="floorShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2c33" stop-opacity="0.45"/>
      <stop offset="40%" stop-color="#000000" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.28"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="55%" r="78%">
      <stop offset="55%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.32"/>
    </radialGradient>

    <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>

  <!-- Wall and floor -->
  <rect x="0" y="0" width="390" height="552" fill="url(#wallTiles)"/>
  <rect x="0" y="0" width="390" height="552" fill="url(#wallShade)"/>

  <rect x="0" y="552" width="390" height="292" fill="url(#floorTiles)"/>
  <rect x="0" y="552" width="390" height="292" fill="url(#floorShade)"/>

  <rect x="0" y="546" width="390" height="10" fill="#243640" fill-opacity="0.5"/>
  <rect x="0" y="548" width="390" height="3" fill="#0e1a20" fill-opacity="0.7"/>

  <!-- ===== Shower fixture (upper right) ===== -->
  <g filter="url(#soft)">
    <ellipse cx="322" cy="86" rx="24" ry="6" fill="url(#chromeH)" opacity="0.95"/>
    <ellipse cx="322" cy="84" rx="21" ry="4.5" fill="#cdd4d8"/>
    <rect x="314.5" y="84" width="15" height="125" fill="url(#chromeV)" rx="2"/>
    <path d="M 314.5 200 Q 314.5 224 296 234 L 268 244" fill="url(#chromeH)" stroke="#3f474d" stroke-width="0.6"/>
    <circle cx="262" cy="248" r="30" fill="url(#chromeH)" stroke="#3f474d" stroke-width="0.9"/>
    <circle cx="262" cy="248" r="23" fill="#c4ccd1"/>
    <circle cx="262" cy="248" r="23" fill="none" stroke="#6b747a" stroke-width="0.5" opacity="0.8"/>
    <g fill="#3a4248" opacity="0.95">
      <circle cx="262" cy="248" r="1.4"/>
      <circle cx="255" cy="241" r="1.4"/>
      <circle cx="269" cy="241" r="1.4"/>
      <circle cx="248" cy="248" r="1.4"/>
      <circle cx="276" cy="248" r="1.4"/>
      <circle cx="255" cy="255" r="1.4"/>
      <circle cx="269" cy="255" r="1.4"/>
      <circle cx="262" cy="262" r="1.4"/>
      <circle cx="262" cy="234" r="1.4"/>
      <circle cx="243" cy="241" r="1.4"/>
      <circle cx="281" cy="241" r="1.4"/>
      <circle cx="243" cy="255" r="1.4"/>
      <circle cx="281" cy="255" r="1.4"/>
      <circle cx="250" cy="262" r="1.4"/>
      <circle cx="274" cy="262" r="1.4"/>
      <circle cx="250" cy="234" r="1.4"/>
      <circle cx="274" cy="234" r="1.4"/>
    </g>
  </g>

  <!-- ===== Wall-mounted basin faucet (mid-left) ===== -->
  <g filter="url(#soft)">
    <rect x="42" y="400" width="62" height="17" rx="3" fill="url(#chromeH)" stroke="#3f474d" stroke-width="0.5"/>
    <circle cx="53" cy="408" r="11" fill="url(#chromeH)" stroke="#3f474d" stroke-width="0.6"/>
    <circle cx="53" cy="408" r="5" fill="#7e858a"/>
    <rect x="52" y="397" width="2.5" height="22" fill="#2a3137" opacity="0.7"/>
    <circle cx="93" cy="408" r="11" fill="url(#chromeH)" stroke="#3f474d" stroke-width="0.6"/>
    <circle cx="93" cy="408" r="5" fill="#7e858a"/>
    <rect x="92" y="397" width="2.5" height="22" fill="#2a3137" opacity="0.7"/>
    <rect x="71" y="417" width="7" height="46" rx="1" fill="url(#chromeV)"/>
    <ellipse cx="74.5" cy="466" rx="11" ry="4" fill="#6c757b" stroke="#3f474d" stroke-width="0.4"/>
    <ellipse cx="74.5" cy="466" rx="7" ry="2.2" fill="#1d2429"/>
  </g>

  <!-- Wall outlet pipe (lower right) -->
  <g filter="url(#soft)" opacity="0.9">
    <ellipse cx="345" cy="500" rx="15" ry="5.5" fill="url(#chromeH)" stroke="#3f474d" stroke-width="0.5"/>
    <ellipse cx="345" cy="498" rx="12" ry="4" fill="#cdd4d8"/>
    <ellipse cx="345" cy="498" rx="7" ry="2.2" fill="#1d2429"/>
  </g>

  <!-- Subtle depth line -->
  <g opacity="0.25">
    <line x1="190" y1="0" x2="190" y2="540" stroke="#3a5560" stroke-width="0.6"/>
  </g>

  <!-- Lighting overlays -->
  <rect x="0" y="0" width="390" height="844" fill="url(#ceilingLight)"/>
  <rect x="0" y="0" width="390" height="844" fill="url(#vignette)"/>
</svg>
